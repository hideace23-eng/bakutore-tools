<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>バクトレ LINE返信アシスタント</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a7a4a; --green-light: #e8f5ee; --green-mid: #2ea86a;
    --gray-bg: #f5f5f3; --gray-border: #e0ddd8;
    --text: #1a1a18; --text-muted: #6b6b66; --white: #ffffff;
    --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }
  header { background: var(--green); padding: 18px 20px 16px; }
  header h1 { font-size: 17px; font-weight: 700; color: white; }
  header p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .container { max-width: 540px; margin: 0 auto; padding: 20px 16px 48px; }
  .card { background: var(--white); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; border: 1px solid var(--gray-border); }
  .card-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  textarea { width: 100%; min-height: 140px; border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-family: inherit; color: var(--text); background: var(--gray-bg); resize: vertical; line-height: 1.6; transition: border-color 0.15s; -webkit-appearance: none; }
  textarea:focus { outline: none; border-color: var(--green-mid); background: var(--white); }
  textarea::placeholder { color: #bbb; font-size: 15px; }
  .btn-main { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; -webkit-appearance: none; margin-bottom: 14px; }
  .btn-main:active { transform: scale(0.98); background: #155e39; }
  .btn-main:disabled { background: #b0b0a8; cursor: not-allowed; transform: none; }
  .result-card { background: var(--white); border-radius: var(--radius); border: 2px solid var(--green); overflow: hidden; margin-bottom: 14px; display: none; }
  .result-header { background: var(--green-light); padding: 11px 16px; }
  .result-header span { font-size: 12px; font-weight: 700; color: var(--green); }
  .result-body { padding: 18px 16px; font-size: 16px; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .result-actions { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--gray-border); }
  .result-actions button { padding: 15px; border: none; background: transparent; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; -webkit-appearance: none; }
  .result-actions button:first-child { border-right: 1px solid var(--gray-border); color: var(--green); }
  .result-actions button:last-child { color: var(--text-muted); }
  .result-actions button:active { background: var(--gray-bg); }
  .loader { display: none; align-items: center; justify-content: center; gap: 7px; padding: 28px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green-mid); animation: bounce 1s infinite; }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-9px);opacity:1} }
  .error-card { background: #fff2f2; border: 1.5px solid #ffcccc; border-radius: var(--radius-sm); padding: 13px 15px; color: #c0392b; font-size: 14px; margin-bottom: 14px; display: none; line-height: 1.5; }
  .api-section { background: #fffbe6; border: 1.5px solid #f0d060; border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 14px; font-size: 13px; color: #7a6200; line-height: 1.6; }
  .api-section strong { display: block; margin-bottom: 4px; font-size: 14px; }
  .api-section input { margin-top: 10px; width: 100%; padding: 11px 13px; border: 1.5px solid #f0d060; border-radius: var(--radius-sm); font-size: 14px; font-family: monospace; background: white; color: var(--text); -webkit-appearance: none; }
  .api-section input:focus { outline: none; border-color: var(--green-mid); }
  .api-btn { margin-top: 10px; padding: 9px 18px; background: var(--green); color: white; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .hint { font-size: 12px; color: var(--text-muted); text-align: center; padding: 4px 0 8px; }
  .powered { text-align: center; font-size: 11px; color: #c0bfb8; padding-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>💬 LINE返信アシスタント</h1>
  <p>バクトレ — お客様対応ツール</p>
</header>

<div class="container">
  <div class="api-section" id="api-section">
    <strong>🔑 初回設定：APIキーを入力してください</strong>
    一度入力すれば次回から不要です。
    <input type="password" id="api-input" placeholder="sk-ant-..." />
    <button class="api-btn" onclick="saveKey()">保存する</button>
  </div>

  <div class="card">
    <div class="card-label">お客様からのメッセージ</div>
    <textarea id="input-msg" placeholder="お客様から届いたLINEをここにペーストしてください"></textarea>
  </div>

  <p class="hint">貼り付けてボタンを押すだけでOK</p>

  <div class="error-card" id="error-card"></div>

  <button class="btn-main" id="gen-btn" onclick="generate()">返信案を生成する</button>

  <div class="result-card" id="result-card">
    <div class="result-header"><span>✅ 返信案</span></div>
    <div class="loader" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="result-body" id="result-text"></div>
    <div class="result-actions">
      <button onclick="copyText()">コピー</button>
      <button onclick="generate()">もう一度</button>
    </div>
  </div>

  <p class="powered">Powered by Claude AI</p>
</div>

<script>
const SYSTEM = `あなたはアクロバット教室「バクトレ」の新規体験一次対応スタッフBotです。
新規体験希望者に対して、不安を和らげ、内容を整理し、体験日時を確定するサポートをします。
営業感・テンプレ感・AI感は出さず、「人がLINEで返信している印象」を最優先にします。

【店舗情報・支払い方法】
■バクトレ世田谷区経堂店（世田谷区経堂1-26-3 ルストレージ経堂304）
　支払い：クレジットカードのみ（タッチ決済・差し込み対応）
■バクトレ世田谷区喜多見店（世田谷区喜多見8-7-3 ポヌール2階）
　支払い：クレジットカードのみ（タッチ決済・差し込み対応）
■バクトレ港区白金高輪店
　支払い：クレジットカードのみ（タッチ決済・差し込み対応）
■バクトレ大阪城東区店
　支払い：クレジットカード・PayPay・現金すべて対応
　※大阪城東区店のみランク制度対象外
営業時間：10〜22時（最終受付21時）／平日・土日祝 対応
※3/23以降は原則クレジットカードのみ（世田谷・港区店）

【習得できる技（スキルツリー）】
倒立を土台に：前転・飛び込み前転・前宙・前宙ひねり・バク転・バク宙・ロンダート・側転・側宙（エアリアル）・ロンダートバク転・ロンダートバク宙・伸身宙返り など

【初回体験料金（1名分）】
- 1人：50分6,000円・80分9,000円
- 1人（学割）：50分5,000円・80分8,000円
- 2人グループ：50分3,500円・80分5,500円
※2名の場合は2名分のお支払い

【入会金】
- 通常：20,000円 → 体験当日入会なら10,000円（半額）
- ご家族2名：12,000円、3人グループ：+4,000円

【ランク制度（3/23〜・世田谷・港区店対象）】
ゴールド（人気No.1）：予約無制限・有効期限無期限
シルバー：予約3枠まで・有効期限6ヶ月
ブロンズ：予約1枠まで・有効期限4ヶ月

【キャンセルポリシー】
24時間前まで無料。24時間以内はチケット1回消化。無断は2回消化。

【その他ルール】
- 未成年は初回のみ保護者と来店必須（同意書・決済確認あり）
- 講師は担当制なし・指名制（指名料別途）
- チケット・会員資格の他人への譲渡・貸与は不可（家族間シェアはOK）
- 初回用LINEと連絡用LINEは別（入会後は連絡用LINEを使う）

【ご紹介特典】
紹介者：50分チケット1枚プレゼント／紹介されたお友達：初回1,000円割引

【大原則】
・お客様向け返信は「見出し3つ固定（■）」で短く分かりやすく
・曜日は絶対に表示しない
・強調（太字、装飾、カッコ強調、記号盛り）は禁止
・断定しすぎない（決定感を出さず、自然な会話文で）
・お客様向け文面では「バク転」より「アクロバット」の表現を優先する

【プラン判断ルール】
・名前が1人分であれば「マンツーマン」前提で案内する
・グループ希望の記載があっても名前が1名なら個人（マンツーマン）として案内し、「グループはご家族・ご友人など面識のある方同士のみ可能」を添える
・12歳までのお子様が80分希望の場合は集中力を考慮し「まずは50分」を自然に提案する

【ジャンル別テンプレ（⑧に該当キーワードがある場合のみ使用）】
▼チア（チアダンス・チアリーディング）
チアダンスやチアリーディングをされている方も多く通ってくださっており、「演技に活かせるようになった！」「本番で技が決まった！」という嬉しいお声もいただいています😊表現力や見せ方まで含めてしっかりサポートいたしますので、安心してお越しください！

▼ミュージカル
ミュージカルに取り組んでいる方も多く通われていて、「舞台でアクロバットが映えるようになった」「振付が自然に繋がるようになった」と好評です✨動きの見せ方や安全な体の使い方まで丁寧にサポートいたしますので、ご安心ください！

▼ダンス（ストリート・バレエなど）
ブレイキンやジャズ、バレエなど、ダンスジャンルの方にも多くご利用いただいています💃「レッスンで褒められるようになった！」など、嬉しいお声もいただいております。"魅せる技"として使えるよう丁寧にサポートしていきます😊

【AIっぽさが出る表現の禁止（最重要）】
以下は絶対に使用しない：
・プライベートレッスン（50分）でのご案内となります
・◯◯プランでのご案内です
・最適です／おすすめです
・「〜になります」を連発する説明文体
・太字、（カッコ強調）、記号での強調

言い換え方針：
（例）今回はまずマンツーマンで、様子を見ながら進められればと思います。
（例）初回は動きやすさも見ながら調整しますね。

【人っぽさを出す公認フレーズ（1通につき1つまで）】
・教えていただき、ありがとうございます。
・内容、しっかり拝見しました。
・初めての方も多いので、ご安心ください。
・無理に進めることはありません。
・もし不安な点があれば、遠慮なく教えてください。

【出力フォーマット（必須・省略禁止）】
必ずこの形式で出力すること。見出しは「■」のみ、3つ固定。

（1）冒頭（見出しなし・固定文言）
お問い合わせありがとうございます。数あるスタジオの中から選んでいただき非常に嬉しいです。

（2）■ ご希望について
・⑧の目的や相談があれば最優先で触れる
・必ず③年齢に触れ、年齢に合ったサポートが可能で安心感を出す
・必要に応じてプラン判断ルールを自然に入れる
・ジャンル該当があればテンプレを短めに差し込む

（3）■ 体験日時について
体験日時について、下記の時間でご案内可能です。
① ◯月◯日 ◯時00分
② ◯月◯日 ◯時00分
（候補は1〜2件、最大3件まで。曜日は書かない）

こちらの時間帯は現在空いておりますが、
他の予約が入る可能性がございますのでご了承ください。

すべての候補日時が難しい場合は、
別の日程をご案内いたしますので、遠慮なくお知らせください。

（4）■ お願い
ご希望の日時（①②どちらでも構いません）を1点ご返信いただけましたら、当日の詳細をお送りします。
ご都合が合わない場合は、ほかにご希望の日時をお知らせいただければ別の日程をご案内いたします。

（5）文末（省略禁止）
担当：

【出力ルール】
・プレーンテキストのみ
・曜日は表示しない
・太字や装飾は禁止
・見出しは「■」のみ、3つ固定
・最後に必ず「担当：」（名前は空欄）を入れる
・返信文のみ出力。説明・前置きは一切不要。



function init() {
  if (localStorage.getItem('baku_key')) {
    document.getElementById('api-section').style.display = 'none';
  }
}

function saveKey() {
  const v = document.getElementById('api-input').value.trim();
  if (!v.startsWith('sk-')) { alert('正しいAPIキーを入力してください（sk-ant-... で始まるもの）'); return; }
  localStorage.setItem('baku_key', v);
  document.getElementById('api-section').style.display = 'none';
}

function showError(m) { const e = document.getElementById('error-card'); e.textContent = m; e.style.display = 'block'; }
function hideError() { document.getElementById('error-card').style.display = 'none'; }

async function generate() {
  const msg = document.getElementById('input-msg').value.trim();
  if (!msg) { showError('お客様からのメッセージをペーストしてください'); return; }
  const key = localStorage.getItem('baku_key');
  if (!key) { document.getElementById('api-section').style.display = 'block'; showError('まずAPIキーを設定してください'); return; }

  hideError();
  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = '生成中...';
  const card = document.getElementById('result-card');
  card.style.display = 'block';
  document.getElementById('result-text').textContent = '';
  document.getElementById('loader').style.display = 'flex';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: 'user', content: `以下のお客様からのLINEに対して、バクトレのスタッフとして適切な返信文を作成してください：\n\n${msg}` }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || '生成に失敗しました');
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    document.getElementById('loader').style.display = 'none';
    document.getElementById('result-text').textContent = text;
  } catch(e) {
    document.getElementById('loader').style.display = 'none';
    card.style.display = 'none';
    showError('エラー: ' + (e.message || '通信に失敗しました。もう一度お試しください。'));
  } finally {
    btn.disabled = false; btn.textContent = '返信案を生成する';
  }
}

function copyText() {
  const t = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const b = event.target;
    b.textContent = 'コピーしました ✓';
    setTimeout(() => b.textContent = 'コピー', 2000);
  }).catch(() => {
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('result-text'));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}

init();
</script>
</body>
</html>
