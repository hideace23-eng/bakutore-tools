<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>バクトレ LINE返信アシスタント</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a7a4a; --green-light: #e8f5ee; --green-mid: #2ea86a;
    --gray-bg: #f5f5f3; --gray-border: #e0ddd8;
    --text: #1a1a18; --text-muted: #6b6b66; --white: #ffffff;
    --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }
  header { background: var(--green); padding: 18px 20px 16px; }
  header h1 { font-size: 17px; font-weight: 700; color: white; }
  header p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .container { max-width: 540px; margin: 0 auto; padding: 20px 16px 48px; }
  .card { background: var(--white); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; border: 1px solid var(--gray-border); }
  .card-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  textarea { width: 100%; min-height: 140px; border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-family: inherit; color: var(--text); background: var(--gray-bg); resize: vertical; line-height: 1.6; transition: border-color 0.15s; -webkit-appearance: none; }
  textarea:focus { outline: none; border-color: var(--green-mid); background: var(--white); }
  textarea::placeholder { color: #bbb; font-size: 15px; }
  .btn-main { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; -webkit-appearance: none; margin-bottom: 14px; }
  .btn-main:active { transform: scale(0.98); background: #155e39; }
  .btn-main:disabled { background: #b0b0a8; cursor: not-allowed; transform: none; }
  .result-card { background: var(--white); border-radius: var(--radius); border: 2px solid var(--green); overflow: hidden; margin-bottom: 14px; display: none; }
  .result-header { background: var(--green-light); padding: 11px 16px; }
  .result-header span { font-size: 12px; font-weight: 700; color: var(--green); }
  .result-body { padding: 18px 16px; font-size: 16px; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .result-actions { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--gray-border); }
  .result-actions button { padding: 15px; border: none; background: transparent; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; -webkit-appearance: none; }
  .result-actions button:first-child { border-right: 1px solid var(--gray-border); color: var(--green); }
  .result-actions button:last-child { color: var(--text-muted); }
  .result-actions button:active { background: var(--gray-bg); }
  .loader { display: none; align-items: center; justify-content: center; gap: 7px; padding: 28px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green-mid); animation: bounce 1s infinite; }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-9px);opacity:1} }
  .error-card { background: #fff2f2; border: 1.5px solid #ffcccc; border-radius: var(--radius-sm); padding: 13px 15px; color: #c0392b; font-size: 14px; margin-bottom: 14px; display: none; line-height: 1.5; }
  .api-section { background: #fffbe6; border: 1.5px solid #f0d060; border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 14px; font-size: 13px; color: #7a6200; line-height: 1.6; }
  .api-section strong { display: block; margin-bottom: 4px; font-size: 14px; }
  .api-section input { margin-top: 10px; width: 100%; padding: 11px 13px; border: 1.5px solid #f0d060; border-radius: var(--radius-sm); font-size: 14px; font-family: monospace; background: white; color: var(--text); -webkit-appearance: none; }
  .api-section input:focus { outline: none; border-color: var(--green-mid); }
  .api-btn { margin-top: 10px; padding: 9px 18px; background: var(--green); color: white; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; display: block; }
  .hint { font-size: 12px; color: var(--text-muted); text-align: center; padding: 4px 0 8px; }
  .powered { text-align: center; font-size: 11px; color: #c0bfb8; padding-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>LINE返信アシスタント</h1>
  <p>バクトレ — お客様対応ツール</p>
</header>

<div class="container">
  <div class="api-section" id="api-section">
    <strong>初回設定：APIキーを入力してください</strong>
    一度入力すれば次回から不要です。
    <input type="password" id="api-input" placeholder="sk-ant-..." />
    <button class="api-btn" id="save-btn">保存する</button>
  </div>

  <div class="card">
    <div class="card-label">お客様からのメッセージ</div>
    <textarea id="input-msg" placeholder="お客様から届いたLINEをここにペーストしてください"></textarea>
  </div>

  <p class="hint">貼り付けてボタンを押すだけでOK</p>

  <div class="error-card" id="error-card"></div>

  <button class="btn-main" id="gen-btn">返信案を生成する</button>

  <div class="result-card" id="result-card">
    <div class="result-header"><span>返信案</span></div>
    <div class="loader" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="result-body" id="result-text"></div>
    <div class="result-actions">
      <button id="copy-btn">コピー</button>
      <button id="retry-btn">もう一度</button>
    </div>
  </div>

  <p class="powered">Powered by Claude AI</p>
</div>

<script>
var SYSTEM = "あなたはアクロバット教室「バクトレ」の新規体験一次対応スタッフBotです。\n新規体験希望者に対して、不安を和らげ、内容を整理し、体験日時を確定するサポートをします。\n営業感・テンプレ感・AI感は出さず、「人がLINEで返信している印象」を最優先にします。\n\n【店舗情報・支払い方法】\nバクトレ世田谷区経堂店（世田谷区経堂1-26-3 ルストレージ経堂304）\n支払い：クレジットカードのみ（タッチ決済・差し込み対応）\nバクトレ世田谷区喜多見店（世田谷区喜多見8-7-3 ポヌール2階）\n支払い：クレジットカードのみ（タッチ決済・差し込み対応）\nバクトレ港区白金高輪店\n支払い：クレジットカードのみ（タッチ決済・差し込み対応）\nバクトレ大阪城東区店\n支払い：クレジットカード・PayPay・現金すべて対応（大阪のみランク制度対象外）\n営業時間：10〜22時（最終受付21時）／平日・土日祝 対応\n3月23日以降は原則クレジットカードのみ（世田谷・港区店）\n\n【初回体験料金（1名分）】\n1人：50分6,000円・80分9,000円\n1人（学割）：50分5,000円・80分8,000円\n2人グループ：50分3,500円・80分5,500円（1名分）\n※2名の場合は2名分のお支払い\n\n【入会金】\n通常：20,000円\n体験当日入会：10,000円（半額）\nご家族2名：12,000円、3人グループ：+4,000円\n\n【ランク制度（3/23〜・世田谷・港区店対象）】\nゴールド（人気No.1）：予約無制限・有効期限無期限\nシルバー：予約3枠まで・有効期限6ヶ月\nブロンズ：予約1枠まで・有効期限4ヶ月\n\n【大原則】\n・お客様向け返信は「見出し3つ固定（■）」で短く分かりやすく\n・曜日は絶対に表示しない\n・強調（太字、装飾、カッコ強調、記号盛り）は禁止\n・お客様向け文面では「バク転」より「アクロバット」の表現を優先する\n\n【プラン判断ルール】\n・名前が1人分であれば「マンツーマン」前提で案内する\n・12歳までのお子様が80分希望の場合は「まずは50分」を自然に提案する\n\n【AIっぽさが出る表現の禁止】\n・プライベートレッスン（50分）でのご案内となります\n・○○プランでのご案内です\n・最適です／おすすめです\n・「〜になります」を連発する説明文体\n\n【出力フォーマット（必須・省略禁止）】\n\n冒頭（固定文言）:\nお問い合わせありがとうございます。数あるスタジオの中から選んでいただき非常に嬉しいです。\n\n■ ご希望について\n（年齢・プラン・目的への言及。ジャンル該当があれば一言添える）\n\n■ 体験日時について\n体験日時について、下記の時間でご案内可能です。\n① ○月○日 ○時00分\n② ○月○日 ○時00分\n（候補は1〜2件。曜日は書かない）\n\nこちらの時間帯は現在空いておりますが、\n他の予約が入る可能性がございますのでご了承ください。\n\nすべての候補日時が難しい場合は、\n別の日程をご案内いたしますので、遠慮なくお知らせください。\n\n■ お願い\nご希望の日時（①②どちらでも構いません）を1点ご返信いただけましたら、当日の詳細をお送りします。\nご都合が合わない場合は、ほかにご希望の日時をお知らせいただければ別の日程をご案内いたします。\n\n担当：\n\n【出力ルール】\n・プレーンテキストのみ\n・曜日は表示しない\n・太字や装飾は禁止\n・見出しは「■」のみ、3つ固定\n・最後に必ず「担当：」（名前は空欄）\n・返信文のみ出力。説明・前置きは一切不要。";

function init() {
  if (localStorage.getItem('baku_key')) {
    document.getElementById('api-section').style.display = 'none';
  }
  document.getElementById('save-btn').addEventListener('click', saveKey);
  document.getElementById('gen-btn').addEventListener('click', generate);
  document.getElementById('copy-btn').addEventListener('click', copyText);
  document.getElementById('retry-btn').addEventListener('click', generate);
}

function saveKey() {
  var v = document.getElementById('api-input').value.trim();
  if (!v.startsWith('sk-')) {
    alert('正しいAPIキーを入力してください（sk-ant-... で始まるもの）');
    return;
  }
  localStorage.setItem('baku_key', v);
  document.getElementById('api-section').style.display = 'none';
  alert('保存しました！');
}

function showError(m) {
  var e = document.getElementById('error-card');
  e.textContent = m;
  e.style.display = 'block';
}

function hideError() {
  document.getElementById('error-card').style.display = 'none';
}

function getTodayStr() {
  var now = new Date();
  var y = now.getFullYear();
  var m = now.getMonth() + 1;
  var d = now.getDate();
  return y + '年' + m + '月' + d + '日（今日）';
}

function highlightPlaceholders(text) {
  var div = document.createElement('div');
  var lines = text.split('\n');
  lines.forEach(function(line, i) {
    var span = document.createElement('span');
    // 日時候補行（① ② ③ で始まる行）をハイライト
    if (/^[①②③]/.test(line.trim())) {
      span.style.display = 'block';
      span.style.background = '#fff3cd';
      span.style.borderLeft = '4px solid #f0a500';
      span.style.padding = '4px 10px';
      span.style.margin = '4px 0';
      span.style.borderRadius = '4px';
      span.style.fontWeight = 'bold';
      span.textContent = line;
    }
    // 担当：の行をハイライト
    else if (/^担当：/.test(line.trim())) {
      span.style.display = 'block';
      span.style.background = '#fde8e8';
      span.style.borderLeft = '4px solid #e05050';
      span.style.padding = '4px 10px';
      span.style.margin = '4px 0';
      span.style.borderRadius = '4px';
      span.style.fontWeight = 'bold';
      span.textContent = line + '（← ここに名前を入れてください）';
    }
    else {
      span.style.display = 'block';
      span.textContent = line;
    }
    div.appendChild(span);
  });
  return div;
}

function generate() {
  var msg = document.getElementById('input-msg').value.trim();
  if (!msg) { showError('お客様からのメッセージをペーストしてください'); return; }

  var key = localStorage.getItem('baku_key');
  if (!key) {
    document.getElementById('api-section').style.display = 'block';
    showError('まずAPIキーを設定してください');
    return;
  }

  hideError();
  var btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '生成中...';

  var card = document.getElementById('result-card');
  card.style.display = 'block';
  var resultText = document.getElementById('result-text');
  resultText.textContent = '';
  document.getElementById('loader').style.display = 'flex';

  var today = getTodayStr();
  var userContent = '今日の日付は' + today + 'です。この日付を基準に、体験希望日の候補を正しい月・日で提示してください。\n\n以下のお客様からのLINEに返信文を作成してください：\n\n' + msg;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages: [{ role: 'user', content: userContent }]
    })
  })
  .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
  .then(function(result) {
    document.getElementById('loader').style.display = 'none';
    if (!result.ok) throw new Error(result.data && result.data.error ? result.data.error.message : '生成に失敗しました');
    var text = '';
    if (result.data.content) {
      for (var i = 0; i < result.data.content.length; i++) {
        if (result.data.content[i].type === 'text') { text = result.data.content[i].text; break; }
      }
    }
    // ハイライト表示
    resultText.innerHTML = '';
    resultText.appendChild(highlightPlaceholders(text));
    // コピー用にプレーンテキストも保存
    resultText.dataset.plain = text;
  })
  .catch(function(err) {
    document.getElementById('loader').style.display = 'none';
    card.style.display = 'none';
    showError('エラー: ' + (err.message || '通信に失敗しました'));
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = '返信案を生成する';
  });
}

function copyText() {
  var el = document.getElementById('result-text');
  var t = el.dataset.plain || el.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(function() {
      var b = document.getElementById('copy-btn');
      b.textContent = 'コピーしました';
      setTimeout(function() { b.textContent = 'コピー'; }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = t;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var b = document.getElementById('copy-btn');
    b.textContent = 'コピーしました';
    setTimeout(function() { b.textContent = 'コピー'; }, 2000);
  }
}

window.onload = init;
</script>
</body>
</html>
